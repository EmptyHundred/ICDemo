<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Sphere of Words</title>
<link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <canvas id="stage"></canvas>
  <button id="toggle" title="Options">≡</button>
  <div id="options" class="hidden">
    <div class="opt-head">
      <span>Options</span>
      <button id="opt-close" title="Close">×</button>
    </div>
    <label class="opt-row">
      <span>Spin speed</span>
      <input id="opt-speed" type="range" min="0" max="1.2" step="0.01" />
      <output id="opt-speed-val"></output>
    </label>
    <label class="opt-row">
      <span>Flight time</span>
      <input id="opt-flight" type="range" min="400" max="3500" step="50" />
      <output id="opt-flight-val"></output>
    </label>
    <label class="opt-row">
      <span>Out bounce</span>
      <input id="opt-outbounce" type="range" min="0" max="2.5" step="0.05" />
      <output id="opt-outbounce-val"></output>
    </label>
    <label class="opt-row">
      <span>In bounce</span>
      <input id="opt-inbounce" type="range" min="0" max="2" step="0.05" />
      <output id="opt-inbounce-val"></output>
    </label>
    <label class="opt-row">
      <span>Chars per wave</span>
      <input id="opt-wave" type="range" min="1" max="60" step="1" />
      <output id="opt-wave-val"></output>
    </label>
    <label class="opt-check">
      <input id="opt-trace" type="checkbox" checked />
      <span>Show traces</span>
    </label>
    <label class="opt-check">
      <input id="opt-textbox" type="checkbox" checked />
      <span>Show source bar</span>
    </label>
  </div>
  <div id="panel">
    <div id="source-bar" class="source-bar"></div>
    <button id="animate-btn" class="animate-btn">Animate</button>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
