<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Sphere of Words</title>
<link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <canvas id="stage"></canvas>
  <button id="toggle" title="Show / hide controls">≡</button>
  <div id="panel">
    <textarea id="text" spellcheck="false">Our introductory fiction class guides students through the process of writing a short story. No prior writing experience is necessary. Through daily writing assignments and class meetings, students will learn about the key building blocks of fiction—language, character, and plot—and will each complete their own short story by the end of the course. In addition to submitting daily assignments, students will meet several times as a group with our instructors and have the opportunity to ask questions during office hours. Students will also meet individually with an editor and editorial assistant to discuss their own short stories, and will not only receive written feedback on their first drafts and final stories, but on all daily assignments.</textarea>
    <button id="run" class="btn">Animate</button>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
