<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Sphere of Words</title>
<link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <canvas id="stage"></canvas>
  <button id="toggle" title="Options">≡</button>
  <div id="options" class="hidden">
    <div class="opt-head">
      <span>Options</span>
      <button id="opt-close" title="Close">×</button>
    </div>
    <label class="opt-row">
      <span>Spin speed</span>
      <input id="opt-speed" type="range" min="0" max="1.2" step="0.01" />
      <output id="opt-speed-val"></output>
    </label>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
